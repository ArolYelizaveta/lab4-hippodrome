name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install SQLite3 and Google Test
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libgtest-dev
          cd /usr/src/gtest
          sudo cmake CMakeLists.txt
          sudo make
          sudo cp lib/*.a /usr/lib

      - name: Create directories
        run: mkdir -p build bin test_build

      - name: Build project
        run: make

      - name: Build and run tests
        run: make test

      - name: Verify build
        run: test -f bin/hippodrome && echo "Build successful"

      - name: Clean build
        run: make clean